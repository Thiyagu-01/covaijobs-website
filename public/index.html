<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta Tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    
    <!-- SEO: Title & Description -->
    <title>COVAIJOBS – Coimbatore's Smart Job Portal | Post & Apply for Jobs</title>
    <meta
      name="description"
      content="CovaiJobs is Coimbatore’s trusted job portal to find top jobs and hire skilled professionals. Post jobs, apply instantly, and connect with top employers in the region."
    />
    
    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="CovaiJobs, Coimbatore jobs, job portal, IT jobs, fresher jobs, experienced jobs, job posting, hire employees, internships, walk-in jobs, private jobs, part-time jobs"
    />

    <!-- Author & Robots -->
    <meta name="author" content="Karan" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (for social sharing) -->
    <meta property="og:title" content="CovaiJobs – Coimbatore Job Portal" />
    <meta property="og:description" content="Find jobs or hire talent in Coimbatore with CovaiJobs – the easiest way to connect employers and job seekers." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://covaijobs.in" />
    <meta property="og:image" content="https://covaijobs.in/logo.png" />

    <!-- Global CSS -->
    <link rel="stylesheet" href="%PUBLIC_URL%/index.css" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto+Slab:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />

    <!-- Prevent Horizontal Scroll -->
    <style>
      body {
        overflow-x: hidden;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
